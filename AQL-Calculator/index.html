<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQL Sampling Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="outer-box"> 
      <div class="container">
        <h1>AQL SAMPLING SIMULATOR</h1>
        <div class="input-group">
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" min="2" value="2">
        </div>
        <div class="input-group">
            <label for="inspectionLevel">Inspection Level:</label>
            <select id="inspectionLevel">
                <option value="" disabled>General Inspection</option>
                <option value="I">I</option>
                <option value="II" selected>II</option>
                <option value="III">III</option>
                <option value="" disabled>Special Inspection</option>
                <option value="S1">S1</option>
                <option value="S2">S2</option>
                <option value="S3">S3</option>
                <option value="S4">S4</option>
                
                
            </select>
        </div>
        <div class="defect-selection">

  <!-- Critical -->
  <div class="result-box">
    <h3>Critical Defects</h3>
    <div class="input-group">
            <label for="aqlLevel_Critical">AQL Level:</label>
            <select id="aqlLevel_Critical">
                <option value="Not_Allowed">Not Allowed</option>
                <option value="0.065">0.065</option>
                <option value="0.10">0.10</option>
                <option value="0.15">0.15</option>
                <option value="0.25">0.25</option>
                <option value="0.40">0.40</option>
                <option value="0.65">0.65</option>
                <option value="1.0">1.0</option>
                <option value="1.5">1.5</option>
                <option value="2.5" selected>2.5</option>
                <option value="4.0">4.0</option>
                <option value="6.5">6.5</option>
            </select>
        </div>
  </div>

  <!-- Major -->
  <div class="result-box">
    <h3>Major Defects</h3>
    <div class="input-group">
            <label for="aqlLevel_Major">AQL Level:</label>
            <select id="aqlLevel_Major">
                <option value="Not_Allowed">Not Allowed</option>
                <option value="0.065">0.065</option>
                <option value="0.10">0.10</option>
                <option value="0.15">0.15</option>
                <option value="0.25">0.25</option>
                <option value="0.40">0.40</option>
                <option value="0.65">0.65</option>
                <option value="1.0">1.0</option>
                <option value="1.5">1.5</option>
                <option value="2.5" selected>2.5</option>
                <option value="4.0">4.0</option>
                <option value="6.5">6.5</option>
            </select>
        </div>
  </div>

  <!-- Minor -->
  <div class="result-box">
    <h3>Minor Defects</h3>
    <div class="input-group">
            <label for="aqlLevel_Minor">AQL Level:</label>
            <select id="aqlLevel_Minor">
                <option value="Not_Allowed">Not Allowed</option>
                <option value="0.065">0.065</option>
                <option value="0.10">0.10</option>
                <option value="0.15">0.15</option>
                <option value="0.25">0.25</option>
                <option value="0.40">0.40</option>
                <option value="0.65">0.65</option>
                <option value="1.0">1.0</option>
                <option value="1.5">1.5</option>
                <option value="2.5" selected>2.5</option>
                <option value="4.0">4.0</option>
                <option value="6.5">6.5</option>
            </select>
        </div>
  </div>

</div>

            <label for="aqlLevel">AQL Level:</label>
            <select id="aqlLevel">

                <option value="0.15">0.15</option>

            </select>

        <button onclick="calculateAQL()">Calculate</button>
        <div class="defect-results">
            <!-- Critical -->
           <div class="result-box">
                <h3>Critical</h3>
            <label>Sample Size</label>
            <input type="text" id="sampleSize_Critical" readonly>

            <label>Accept Point</label>
            <input type="text" id="acceptPoint_Critical" readonly>

            <label>Reject Point</label>
            <input type="text" id="rejectPoint_Critical" readonly>
           </div> 

           <!-- Major -->
           <div class="result-box">
                <h3>Major</h3>
            <label>Sample Size</label>
            <input type="text" id="sampleSize_Major" readonly>

            <label>Accept Point</label>
            <input type="text" id="acceptPoint_Major" readonly>

            <label>Reject Point</label>
            <input type="text" id="rejectPoint_Major" readonly>
           </div>

           <!-- Minor -->
           <div class="result-box">
               <h3>Minor</h3>
            <label>Sample Size</label>
            <input type="text" id="sampleSize_Minor" readonly>

            <label>Accept Point</label>
            <input type="text" id="acceptPoint_Minor" readonly>

            <label>Reject Point</label>
            <input type="text" id="rejectPoint_Minor" readonly>
           </div>


        </div>

            <label>Accept Point</label>
            <input type="text" id="acceptPoint" readonly>

            <input type="text" id="rejectPoint" readonly>
        </div> -->
      </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
